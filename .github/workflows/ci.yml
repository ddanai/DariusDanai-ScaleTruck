name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  docs-and-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository layout
        run: |
          test -d docs
          test -d ros2_ws/src
          test -d firmware/teensy
          test -f README.md

