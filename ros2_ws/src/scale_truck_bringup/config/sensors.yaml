usb_cam:
  ros__parameters:
    video_device: /dev/video0
    image_width: 640
    image_height: 480
    pixel_format: yuyv
    camera_frame_id: usb_cam
    io_method: mmap

rplidar_node:
  ros__parameters:
    serial_port: /dev/ttyUSB0
    serial_baudrate: 256000
    frame_id: laser
    inverted: false
    angle_compensate: true
    scan_mode: Stability

obstacle_extractor:
  ros__parameters:
    active: true
    use_scan: true
    use_pcl: false
    use_split_and_merge: true
    circles_from_visibles: true
    discard_converted_segments: true
    transform_coordinates: true
    min_group_points: 5
    max_group_distance: 0.2
    distance_proportion: 0.00628
    max_split_distance: 0.2
    max_merge_separation: 0.2
    max_merge_spread: 0.2
    max_circle_radius: 0.6
    radius_enlargement: 0.3
    frame_id: laser

obstacle_tracker:
  ros__parameters:
    active: true
    copy_segments: true
    loop_rate: 30.0
    tracking_duration: 1.0
    min_correspondence_cost: 0.3
    std_correspondence_dev: 0.15
    process_variance: 0.01
    process_rate_variance: 0.1
    measurement_variance: 1.0
    frame_id: laser

